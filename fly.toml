# fly.toml app configuration file generated for princemuel on 2026-04-08T02:23:22+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app            = "princemuel"
primary_region = "iad"

[build]
dockerfile = "./Dockerfile"

[http_service]
internal_port        = 80
force_https          = true
auto_stop_machines   = "stop"
auto_start_machines  = true
min_machines_running = 0
processes            = ["app"]

[[services.tcp_checks]]
grace_period = "10s"
interval     = "15s"
timeout      = "2s"

[[services.http_checks]]
grace_period    = "10s"
interval        = "10s"
method          = "get"
path            = "/health"
protocol        = "http"
timeout         = "2s"
tls_skip_verify = false

[[vm]]
cpu_kind  = "shared"
memory    = "1gb"
cpus      = 2
memory_mb = 1024

[env]
NODE_ENV = "production"

[deploy]
release_command = "pnpm db:migrate-deploy"
strategy        = "rolling"
