packages:
  - apps/*
  - packages/*

catalog:
  '@dotenvx/dotenvx': ^1.51.1
  '@total-typescript/ts-reset': ^0.6.1
  '@types/node': 25.0.1
  '@typescript/native-preview': 7.0.0-dev.20260130.1
  oxlint: ^1.42.0
  oxlint-tsgolint: ^0.11.4
  prettier: ^3.8.1
  tsx: 4.21.0
  vite: ^7.3.1

catalogMode: manual

onlyBuiltDependencies:
  - '@prisma/engines'
  - esbuild
  - prisma
  - sharp
  - workerd

supportedArchitectures:
  cpu: [current]

verifyDepsBeforeRun: install
